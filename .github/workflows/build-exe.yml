name: Build Windows EXE

# Build the desktop app into a Windows .exe on a GitHub-hosted Windows runner
# and upload the result as a downloadable artifact.
on:
  workflow_dispatch:        # run manually from the Actions tab
  push:
    tags:
      - "v*"                # also build on version tags (e.g. v1.0.0)

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pip install -e .

      - name: Build executable
        run: pyinstaller --clean --noconfirm UI_pipeline.spec

      - name: Show build output
        run: |
          echo "Contents of dist:"
          dir dist
          dir dist\AutomatedLiteratureReview

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutomatedLiteratureReview-windows
          path: dist/AutomatedLiteratureReview
          retention-days: 14
          if-no-files-found: error
